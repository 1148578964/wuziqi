<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | GoBang2</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.css"/>

</head>
<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
      <div id="errorLog" style="display:none;position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:#fff;padding:20px;z-index:9999;font-size:14px;text-align:left;white-space:pre-wrap;max-height:50vh;overflow:auto;"></div>
    </div>


<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    var _el = document.getElementById('errorLog');
    function showErr(msg) {
      _el.style.display = 'block';
      _el.textContent += msg + '\n';
    }
    window.onerror = function(msg, src, line, col, err) {
      showErr('ERROR: ' + msg + ' at ' + src + ':' + line);
      console.error(msg, src, line, err);
    };
    window.addEventListener('unhandledrejection', function(e) {
      showErr('REJECTION: ' + (e.reason ? e.reason.message : ''));
      console.error(e.reason);
    });
    showErr('[INIT] Loading...');
    System.import('./index.js').then(function() {
      showErr('[OK] System.import ./index.js success');
    })["catch"](function(err) {
      showErr('[FAIL] System.import ./index.js: ' + (err.message || err));
      console.error(err);
    });
</script>

</body>
</html>
